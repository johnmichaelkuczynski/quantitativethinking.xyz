kind = "video"
previewPath = "/demo/"
title = "Quantitative Critical Reasoning Demo Video"
version = "1.0.0"
id = "artifacts/qr-course-demo"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/demo/" ]
localPort = 26272

[services.development]
run = "pnpm --filter @workspace/qr-course-demo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/qr-course-demo", "run", "build" ]
publicDir = "artifacts/qr-course-demo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26272"
BASE_PATH = "/demo/"
